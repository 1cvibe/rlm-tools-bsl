name: "Баг-репорт"
description: "Сообщить об ошибке в rlm-tools-bsl"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Описание проблемы
      description: Что пошло не так?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Как воспроизвести ошибку?
      placeholder: |
        1. Запустил сервер с параметрами ...
        2. Отправил запрос ...
        3. Получил ошибку ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что произошло на самом деле?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия rlm-tools-bsl
      placeholder: "1.4.2"
    validations:
      required: true

  - type: dropdown
    id: python
    attributes:
      label: Версия Python
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Операционная система
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Формат исходников 1С
      options:
        - "CF (Конфигуратор)"
        - EDT
        - "Не применимо"

  - type: textarea
    id: context
    attributes:
      label: Дополнительный контекст
      description: Логи, скриншоты, конфигурация .env (без ключей API)
